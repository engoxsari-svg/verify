# index.html'i de oluştur
cat > index.html << 'EOF'
<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Discord • Doğrulama</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: #36393f; display: flex; justify-content: center; align-items: center; min-height: 100vh; font-family: 'Segoe UI', sans-serif; }
        .box { background: #2f3136; padding: 40px; border-radius: 12px; text-align: center; color: #fff; box-shadow: 0 10px 40px rgba(0,0,0,0.5); }
        .box h2 { font-size: 22px; margin-bottom: 10px; }
        .box p { color: #b9bbbe; font-size: 14px; }
        .check { font-size: 60px; margin-bottom: 15px; }
        .loader { width: 50px; height: 50px; border: 4px solid #40444b; border-top: 4px solid #5865f2; border-radius: 50%; margin: 20px auto; animation: spin 1s linear infinite; }
        @keyframes spin { to { transform: rotate(360deg); } }
    </style>
</head>
<body>
    <div class="box">
        <div class="check">🔐</div>
        <h2>Hesap Doğrulanıyor...</h2>
        <p>Lütfen bekleyin, sunucuya yönlendiriliyorsunuz.</p>
        <div class="loader"></div>
    </div>
    <script src="script.js"></script>
</body>
</html>
EOF
